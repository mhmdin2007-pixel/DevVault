{% extends 'base.html' %}

{% block title %}DevVault Post | DevVault {% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">
                    <i class="fas fa-trash me-2"></i>Delete Post
                </h4>
            </div>
            <div class="card-body">
                <p class="lead">Are you sure you want to delete <strong>{{ object.tilte }}</strong>?</p>
                <p class="text-muted">This acction connot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-2"></i>Yes, Delete
                        </button>
                        <a href="{% url 'posts:post_detail' object.slug %}" class="btn btn-secondary"></a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h2>{{ post.title }}</h2>
        <p class="text-muted"> {{ post.author.username }} |  {{ post.created_at|date }}</p>
        <hr>
        <p>{{ post.content|linebreaks }}</p>
        <a href="{% url 'posts:home' %}" class="btn btn-secondary">← بازگشت</a>
    </div>
</div>
{% endblock %}
